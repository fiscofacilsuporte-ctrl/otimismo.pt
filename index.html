<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>otimismo.pt — Notícias Positivas para um Mundo Melhor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .news-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fas fa-sun text-xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-tight text-slate-800">otimismo<span class="text-blue-600">.pt</span></span>
            </div>
            <button class="bg-blue-600 text-white px-5 py-2 rounded-full font-semibold hover:bg-blue-700 transition">
                Apoiar ❤️
            </button>
        </div>
    </header>

    <section class="bg-blue-600 text-white py-12 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4">O mundo tem mais boas notícias do que imaginas.</h1>
            <p class="text-lg text-blue-100 mb-6">Histórias de progresso, inovação e solidariedade.</p>
            <span id="update-badge" class="bg-blue-500 px-4 py-2 rounded-full text-xs font-medium italic">A carregar atualizações...</span>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-white rounded-2xl h-80 shadow-sm border border-slate-200"></div>
            <div class="animate-pulse bg-white rounded-2xl h-80 shadow-sm border border-slate-200"></div>
            <div class="animate-pulse bg-white rounded-2xl h-80 shadow-sm border border-slate-200"></div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-10 px-4 mt-20 text-center">
        <p class="text-white font-bold mb-2">otimismo.pt</p>
        <p class="text-xs">&copy; 2026 Todos os direitos reservados.</p>
    </footer>

    <script>
        async function loadNews() {
            const container = document.getElementById('news-container');
            const badge = document.getElementById('update-badge');
            try {
                const response = await fetch('noticias.json?t=' + new Date().getTime());
                const data = await response.json();
                badge.innerText = 'Última atualização: ' + data.last_update;
                container.innerHTML = '';
                data.news.forEach(item => {
                    container.innerHTML += `
                        <article class="news-card bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 flex flex-col h-full">
                            <div class="h-48 overflow-hidden bg-slate-200">
                                <img src="${item.image || 'https://via.placeholder.com/400x200?text=Otimismo.pt'}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=Otimismo.pt'">
                            </div>
                            <div class="p-6 flex flex-grow flex-col">
                                <div class="text-xs font-bold text-blue-600 mb-2 uppercase">${item.source}</div>
                                <h3 class="text-lg font-bold mb-3 leading-tight">${item.title}</h3>
                                <a href="${item.url}" target="_blank" class="mt-auto text-blue-600 font-bold text-sm hover:underline">Ler mais →</a>
                            </div>
                        </article>`;
                });
            } catch (e) {
                container.innerHTML = '<p class="col-span-full text-center py-10">Erro ao carregar notícias. Tente novamente.</p>';
            }
        }
        loadNews();
    </script>
</body>
</html>
